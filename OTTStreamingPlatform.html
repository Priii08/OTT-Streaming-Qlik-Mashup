<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OTT Streaming Analytics Dashboard — powered by Qlik Sense">
    <title>StreamMetrics · OTT Analytics Dashboard</title>

    <!-- ── Google Fonts (Inter) ─────────────────────────────────────────── -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- ── Qlik base styles (required — do not remove) ──────────────────── -->
    <link rel="stylesheet" href="../../resources/autogenerated/qlik-styles.css">

    <!-- ── Dashboard CSS  (load order matters: tokens first) ────────────── -->
    <link rel="stylesheet" href="css/theme.css">          <!-- 1. CSS custom properties / tokens -->
    <link rel="stylesheet" href="OTTStreamingPlatform.css"> <!-- 2. Base layout + header -->
    <link rel="stylesheet" href="css/animations.css">     <!-- 3. Keyframe definitions -->
    <link rel="stylesheet" href="css/cards.css">          <!-- 4. KPI + chart card styles -->
    <link rel="stylesheet" href="css/charts.css">         <!-- 5. Chart container sizing + skeleton -->
    <link rel="stylesheet" href="css/filters.css">        <!-- 6. Filter panel dark theme -->
    <link rel="stylesheet" href="css/background.css">    <!-- 7. Animated background paths -->

    <!-- ── Apache ECharts v5 ────────────────────────────────────────────── -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

    <!-- ── Qlik RequireJS loader (must stay — loads qlik module) ────────── -->
    <script src="../../resources/assets/external/requirejs/require.js"></script>

    <!-- ── Dashboard JS modules (dependency order is critical) ──────────── -->
    <!--  Level 0: no dependencies -->
    <script src="js/background.js"></script>  <!-- Animated background paths (no deps) -->
    <script src="js/adapters.js"></script>    <!-- Fields, Measures, Dims, DataAdapters -->
    <script src="js/utils.js"></script>       <!-- formatNumber, ResizeObserver, debounce -->

    <!--  Level 1: depends on adapters + utils -->
    <script src="js/hypercube.js"></script>   <!-- HypercubeManager (HM alias) -->

    <!--  Level 2: depends on HM + adapters + utils -->
    <script src="js/kpi.js"></script>         <!-- KPIManager -->
    <script src="js/charts.js"></script>      <!-- ChartsManager -->
    <script src="js/filters.js"></script>     <!-- FiltersManager -->
    <script src="js/theme.js"></script>       <!-- ThemeManager -->
    <script src="js/dashboard.js"></script>   <!-- Orchestrator -->

    <!--  Bootstrap: opens Qlik app, calls Dashboard.init(app) -->
    <script src="OTTStreamingPlatform.js"></script>
</head>

<body>

<!-- ── Animated background paths — inserted programmatically by background.js ── -->
<div id="bg-paths-canvas"></div>
<script>BackgroundPaths.init();</script>

<!-- ═══════════════════════════════════════════════════════════════════════
     TOP HEADER
══════════════════════════════════════════════════════════════════════════ -->
<header class="top-header">

    <div class="header-left">

        <!-- Logo mark -->
        <div class="logo-box">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="white" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/>
            </svg>
        </div>

        <!-- Brand name -->
        <div class="brand">
            <h2>StreamMetrics</h2>
            <span>OTT Analytics Dashboard</span>
        </div>

        <!-- Live connection badge -->
        <div class="status-badge">
            <span class="status-dot"></span>
            Qlik Sense Connected
        </div>

    </div>

    <div class="header-right">
        <span class="updated">Updated Jul 7, 2026</span>

        <div class="avatars">
            <span class="avatar" aria-label="User avatar">P</span>
        </div>

        <!-- Dark / light toggle — wired by ThemeManager -->
        <button id="themeToggle" class="theme-btn" aria-label="Toggle dark mode">
            <span class="toggle-slider"></span>
            <span class="toggle-label">Dark</span>
        </button>
    </div>

</header>

<!-- ═══════════════════════════════════════════════════════════════════════
     MAIN CONTENT
══════════════════════════════════════════════════════════════════════════ -->
<div class="content-wrapper">

    <!-- ── FILTER PANEL (SIDEBAR) ──────────────────────────────────────────
         Rendered dynamically by FiltersManager in filters.js.
         Uses Qlik's createList API for checkboxes, pills, and collapsibles.
    ──────────────────────────────────────────────────────────────────────── -->
    <div class="filter-container"></div>

    <div class="main-dashboard-content">
        <!-- ── KPI CARDS ─────────────────────────────────────────────────────────
             Inner HTML is injected by KPIManager.init() via kpi.js.
             No h3 here — labels are rendered inside each card by the KPI module.
             IDs must stay unchanged (referenced by kpi.js and Qlik session objects).
        ──────────────────────────────────────────────────────────────────────── -->
        <div class="kpi-container">
            <div class="kpi-card anim-slide-up" style="animation-delay: 0.05s" id="totalTitles"></div>
            <div class="kpi-card anim-slide-up" style="animation-delay: 0.15s" id="totalCountries"></div>
            <div class="kpi-card anim-slide-up" style="animation-delay: 0.25s" id="avgIMDb"></div>
            <div class="kpi-card anim-slide-up" style="animation-delay: 0.35s" id="avgRuntime"></div>
        </div>

        <!-- ── CHARTS ─────────────────────────────────────────────────────────────
             Rendered dynamically by ChartsManager in charts.js.
             Visual type pills (e.g. LINE, BAR) are rendered via CSS --chart-type.
        ──────────────────────────────────────────────────────────────────────── -->
        <div class="charts">

            <div class="chart-card anim-slide-up" style="animation-delay: 0.45s; --chart-type: 'BAR'">
                <h3>Content By Platform</h3>
                <div id="platformDistChart"></div>
            </div>

            <div class="chart-card anim-slide-up" style="animation-delay: 0.55s; --chart-type: 'AREA'">
                <h3>Content Release Trend Over Time</h3>
                <div id="contentReleaseTrendChart"></div>
            </div>

            <div class="chart-card anim-slide-up" style="animation-delay: 0.65s; --chart-type: 'MAP'">
                <h3>Genre Distribution Treemap</h3>
                <div id="genreTreemapChart"></div>
            </div>

            <div class="chart-card anim-slide-up" style="animation-delay: 0.75s; --chart-type: 'SCATTER'">
                <h3>IMDb vs Rotten Tomatoes Analysis</h3>
                <div id="imdbVsRTChart"></div>
            </div>

            <div class="chart-card anim-slide-up" style="animation-delay: 0.85s; --chart-type: 'BAR'">
                <h3>Top 10 Countries by Content</h3>
                <div id="countryAnalysisChart"></div>
            </div>

            <div class="chart-card anim-slide-up" style="animation-delay: 0.95s; --chart-type: 'DUAL'">
                <h3>Content Growth vs IMDb Rating</h3>
                <div id="contentGrowthRatingChart"></div>
            </div>

        </div>
    </div><!-- /.main-dashboard-content -->

</div><!-- /.content-wrapper -->

<!-- ═══════════════════════════════════════════════════════════════════════
     ERROR POPUP — preserved from original mashup
══════════════════════════════════════════════════════════════════════════ -->
<div id="popup">
    <button id="closePopup" aria-label="Close error popup">×</button>
    <p id="popupText"></p>
</div>

</body>
</html>
