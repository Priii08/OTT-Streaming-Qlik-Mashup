<!doctype html>
<html>
<head>
    <meta charset="utf-8">

    <link rel="stylesheet" href="../../resources/autogenerated/qlik-styles.css">
    <link rel="stylesheet" href="OTTStreamingPlatform.css">

    <script src="../../resources/assets/external/requirejs/require.js"></script>
    <script src="OTTStreamingPlatform.js"></script>
</head>

<body>

<div class="header">

    <h1>OTT Streaming Dashboard</h1>

    <button id="themeToggle" class="theme-btn">
        🌙
    </button>

</div>

<div class="filter-container">

    <div class="filter-box">
        <h3>Platform</h3>
        <div id="platformFilter"></div>
    </div>

    <div class="filter-box">
        <h3>Release Year</h3>
        <div id="releaseYearFilter"></div>
    </div>

    <div class="filter-box">
        <h3>Age Rating</h3>
        <div id="ageRatingFilter"></div>
    </div>

    <div class="filter-box">
        <h3>Country</h3>
        <div id="countryFilter"></div>
    </div>

</div>

<div class="kpi-container">

    <div class="kpi-card">
        <h3>Total Titles</h3>
        <div id="totalTitles"></div>
    </div>

    <div class="kpi-card">
        <h3>Total Countries</h3>
        <div id="totalCountries"></div>
    </div>

    <div class="kpi-card">
        <h3>Average IMDb Rating</h3>
        <div id="avgIMDb"></div>
    </div>

    <div class="kpi-card">
        <h3>Average Runtime</h3>
        <div id="avgRuntime"></div>
    </div>

</div>

<div class="charts">

    <div class="chart-card">
        <h3>Content By Platform</h3>
        <div id="contentPlatform"></div>
    </div>

    <div class="chart-card">
        <h3>Content Release Trend</h3>
        <div id="releaseTrend"></div>
    </div>

    <div class="chart-card">
        <h3>Genre Distribution</h3>
        <div id="genreTreemap"></div>
    </div>

    <div class="chart-card">
        <h3>Top 10 Countries</h3>
        <div id="topCountries"></div>
    </div>

    <div class="chart-card">
        <h3>IMDb vs Rotten Tomatoes</h3>
        <div id="imdbScatter"></div>
    </div>

    <div class="chart-card">
        <h3>Content Growth vs IMDb</h3>
        <div id="growthChart"></div>
    </div>

</div>

<div id="popup">
    <button id="closePopup">×</button>
    <p id="popupText"></p>
</div>


</body>
</html>
